{{- if and (.Values.secret) (.Values.secret.enabled) }}

{{- $postgresAdminPassword := include "salamruby.postgresAdminPassword" . }}
{{- $postgresUserPassword := include "salamruby.postgresUserPassword" . }}
{{- $redisPassword := "" }}
{{- if and .Values.redis.enabled .Values.redis.auth.enabled }}
{{- $redisPassword = include "salamruby.redisPassword" . }}
{{- end }}
{{- $webappUrl := required "salamruby.webappUrl is required. Set it to your SalamRuby instance URL (e.g., https://salamruby.example.com)" .Values.salamruby.webappUrl }}
{{- $hubApiKey := include "salamruby.hubApiKey" . }}
{{- $cubejsApiSecret := include "salamruby.cubejsApiSecret" . }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "salamruby.appSecretName" . }}
  labels:
    {{- include "salamruby.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
data:
  # SalamRuby application URLs
  WEBAPP_URL: {{ $webappUrl | b64enc }}
  NEXTAUTH_URL: {{ $webappUrl | b64enc }}
  {{- if .Values.salamruby.publicUrl }}
  PUBLIC_URL: {{ .Values.salamruby.publicUrl | b64enc }}
  {{- end }}
  {{- if and .Values.redis.enabled .Values.redis.auth.enabled }}
  REDIS_URL: {{ printf "redis://:%s@%s:6379" $redisPassword (include "salamruby.redisMasterName" .) | b64enc }}
  {{- else if .Values.redis.enabled }}
  REDIS_URL: {{ printf "redis://%s:6379" (include "salamruby.redisMasterName" .) | b64enc }}
  {{- else }}
  REDIS_URL: {{ .Values.redis.externalRedisUrl | b64enc }}
  {{- end }}
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: {{ printf "postgresql://salamruby:%s@salamruby-postgresql/salamruby" $postgresUserPassword | b64enc }}
  {{- else }}
  DATABASE_URL: {{ .Values.postgresql.externalDatabaseUrl | b64enc }}
  {{- end }}
  HUB_API_KEY: {{ $hubApiKey | b64enc }}
  credential: {{ printf "Bearer %s" $hubApiKey | b64enc }}
  CUBEJS_API_SECRET: {{ $cubejsApiSecret | b64enc }}
  CRON_SECRET: {{ include "salamruby.cronSecret" . | b64enc }}
  ENCRYPTION_KEY: {{ include "salamruby.encryptionKey" . | b64enc }}
  NEXTAUTH_SECRET: {{ include "salamruby.nextAuthSecret" . | b64enc }}
  {{- if and (.Values.enterprise.licenseKey) (ne .Values.enterprise.licenseKey "") }}
  ENTERPRISE_LICENSE_KEY: {{ .Values.enterprise.licenseKey | b64enc }}
  {{- end }}
  {{- if and .Values.redis.enabled .Values.redis.auth.enabled }}
  REDIS_PASSWORD: {{ $redisPassword | b64enc }}
  {{- end }}
  {{- if .Values.postgresql.enabled }}
  POSTGRES_ADMIN_PASSWORD: {{ $postgresAdminPassword | b64enc }}
  POSTGRES_USER_PASSWORD: {{ $postgresUserPassword | b64enc }}
  {{- end }}
{{- end }}
