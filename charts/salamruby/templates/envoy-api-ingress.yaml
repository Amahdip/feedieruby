{{- if and .Values.envoy.enabled .Values.envoy.salamruby.ingress.enabled }}
{{- $explicitHost := "" -}}
{{- if .Values.envoy.salamruby.ingress.host -}}
{{- $explicitHost = tpl .Values.envoy.salamruby.ingress.host $ | trim -}}
{{- end -}}
{{- if and .Values.ingress.enabled .Values.ingress.hosts (gt (len .Values.ingress.hosts) 0) (not $explicitHost) -}}
{{- fail "envoy.salamruby.ingress.host must be set explicitly when ingress.enabled and envoy.salamruby.ingress.enabled are both true" -}}
{{- end -}}
{{- $host := include "salamruby.envoy.ingressHost" . -}}
{{- $proxyServiceName := include "salamruby.envoy.proxyServiceName" . -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-envoy-api" (include "salamruby.name" .) }}
  namespace: {{ include "salamruby.namespace" . }}
  labels:
    {{- include "salamruby.labels" . | nindent 4 }}
  {{- if .Values.envoy.salamruby.ingress.annotations }}
  annotations:
    {{- include "salamruby.tplvalues.render" (dict "value" .Values.envoy.salamruby.ingress.annotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.envoy.salamruby.ingress.ingressClassName }}
  ingressClassName: {{ .Values.envoy.salamruby.ingress.ingressClassName }}
  {{- end }}
  rules:
    - host: {{ $host }}
      http:
        paths:
          {{- if .Values.envoy.salamruby.routes.authCallback }}
          - path: /api/auth/callback
            pathType: Prefix
            backend:
              service:
                name: {{ $proxyServiceName }}
                port:
                  number: 80
          {{- end }}
          {{- if .Values.envoy.salamruby.routes.v1Client }}
          - path: /api/v1/client
            pathType: Prefix
            backend:
              service:
                name: {{ $proxyServiceName }}
                port:
                  number: 80
          {{- end }}
          {{- if .Values.envoy.salamruby.routes.v2Client }}
          - path: /api/v2/client
            pathType: Prefix
            backend:
              service:
                name: {{ $proxyServiceName }}
                port:
                  number: 80
          {{- end }}
          {{- if .Values.envoy.salamruby.routes.v1Management }}
          - path: /api/v1/management
            pathType: Prefix
            backend:
              service:
                name: {{ $proxyServiceName }}
                port:
                  number: 80
          {{- end }}
          {{- if .Values.envoy.salamruby.routes.v1Webhooks }}
          - path: /api/v1/webhooks
            pathType: Prefix
            backend:
              service:
                name: {{ $proxyServiceName }}
                port:
                  number: 80
          {{- end }}
          {{- if .Values.envoy.salamruby.routes.feedbackRecords }}
          - path: /api/v3/feedbackRecords
            pathType: Prefix
            backend:
              service:
                name: {{ $proxyServiceName }}
                port:
                  number: 80
          - path: /v1/feedback-records
            pathType: Prefix
            backend:
              service:
                name: {{ $proxyServiceName }}
                port:
                  number: 80
          {{- end }}
          {{- if .Values.envoy.salamruby.routes.storage }}
          - path: /storage
            pathType: Prefix
            backend:
              service:
                name: {{ $proxyServiceName }}
                port:
                  number: 80
          {{- end }}
{{- end }}
