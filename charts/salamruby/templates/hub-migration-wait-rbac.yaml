{{- if and .Values.migration.enabled .Values.hub.migration.waitForSalamRubyMigration.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "salamruby.hubMigrationWaitServiceAccountName" . }}
  labels:
    helm.sh/chart: {{ include "salamruby.chart" . }}
    app.kubernetes.io/name: {{ include "salamruby.hubname" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: hub-migration-wait
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: {{ .Values.partOfOverride | default (include "salamruby.name" .) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "salamruby.hubMigrationWaitServiceAccountName" . }}
  labels:
    helm.sh/chart: {{ include "salamruby.chart" . }}
    app.kubernetes.io/name: {{ include "salamruby.hubname" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: hub-migration-wait
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: {{ .Values.partOfOverride | default (include "salamruby.name" .) }}
rules:
  - apiGroups:
      - batch
    resources:
      - jobs
    resourceNames:
      - {{ include "salamruby.migrationJobName" . }}
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "salamruby.hubMigrationWaitServiceAccountName" . }}
  labels:
    helm.sh/chart: {{ include "salamruby.chart" . }}
    app.kubernetes.io/name: {{ include "salamruby.hubname" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: hub-migration-wait
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: {{ .Values.partOfOverride | default (include "salamruby.name" .) }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "salamruby.hubMigrationWaitServiceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "salamruby.hubMigrationWaitServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
