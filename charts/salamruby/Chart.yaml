apiVersion: v2
name: salamruby
description: A Helm chart for SalamRuby with PostgreSQL, Valkey

type: application

# Helm chart Version
version: 0.0.0-dev

# This is the version number of the application being deployed.
appVersion: "5.0.0-rc.1"

icon: https://salamruby.com/favicon.ico

keywords:
  - salamruby
  - postgresql
  - valkey

home: https://salamruby.com/docs/self-hosting/setup/kubernetes
maintainers:
  - name: SalamRuby
    email: info@salamruby.com

dependencies:
  - name: postgresql
    version: "16.4.16"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
  - name: gateway-helm
    alias: envoy
    version: "v1.7.1"
    repository: "oci://docker.io/envoyproxy"
    condition: envoy.controller.enabled
  - name: redis
    alias: envoyRedis
    version: 20.11.2
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: envoyRedis.enabled
  - name: vllm-stack
    alias: llm
    version: "0.1.11"
    repository: "https://vllm-project.github.io/production-stack"
    condition: llm.enabled
